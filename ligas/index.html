<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Ligas — Inicio</title>
  <link rel="stylesheet" href="../ligas/css/style.css">
  <style>
    /* ── Chips estado/categoría ── */
    .chip { display:inline-flex; align-items:center; padding:2px 9px; border-radius:100px; font-size:10px; font-weight:800; }
    .c-borrador    { background:#f1f5f9; color:#64748b; }
    .c-inscripcion { background:#dbeafe; color:#1e40af; }
    .c-activa      { background:#dcfce7; color:#15803d; }
    .c-fase_final  { background:#fef9c3; color:#92400e; }
    .c-finalizada  { background:#f1f5f9; color:#64748b; }
    .cat-chip { display:inline-flex; padding:2px 8px; border-radius:100px; font-size:10px; font-weight:800; }
    .cat-m { background:#eff6ff; color:#1e40af; }
    .cat-f { background:#f3e8ff; color:#6d28d9; }
    .cat-x { background:#f0fdf4; color:#15803d; }
    .cat-b { background:#fef9c3; color:#92400e; }

    /* ── Liga card desplegable ── */
    .liga-card { background:var(--card); border-radius:16px; border:1.5px solid var(--borde); overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,.06); margin-bottom:8px; }
    .liga-header { display:flex; align-items:center; gap:10px; padding:12px 14px; cursor:pointer; user-select:none; }
    .liga-ico { width:42px; height:42px; border-radius:12px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .liga-ico img { width:36px; height:36px; object-fit:contain; }
    .liga-info { flex:1; min-width:0; }
    .liga-nombre { font-size:14px; font-weight:900; color:var(--texto); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .liga-meta { font-size:10px; font-weight:600; color:var(--sub); margin-top:3px; display:flex; align-items:center; gap:5px; flex-wrap:wrap; }
    .liga-chevron { font-size:14px; color:var(--sutil); transition:transform .2s; flex-shrink:0; font-weight:900; }
    .liga-chevron.open { transform:rotate(90deg); }

    /* Info extra visible en ficha cerrada */
    .liga-stats { display:flex; gap:10px; padding:0 14px 10px; flex-wrap:wrap; }
    .liga-stat { font-size:10px; font-weight:700; color:var(--sub); display:flex; align-items:center; gap:3px; }
    .liga-stat strong { color:var(--texto); font-weight:900; }

    /* Desplegable con solo 2 botones */
    .liga-body { display:none; border-top:1px solid var(--fondo); padding:10px 12px 12px; flex-direction:column; gap:7px; }
    .liga-body.open { display:flex; }
    .liga-2btns { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .liga-abtn { display:flex; align-items:center; justify-content:center; gap:6px; padding:10px 8px; border-radius:12px; border:1.5px solid var(--borde); background:#f8fafc; cursor:pointer; font-family:Nunito,sans-serif; font-size:12px; font-weight:800; color:var(--sub); transition:all .15s; }
    .liga-abtn:hover { background:#f1f5f9; }
    .liga-abtn.editar { background:#eff6ff; border-color:#bfdbfe; color:var(--azul); }
    .liga-abtn.editar:hover { background:#dbeafe; }
    .liga-abtn.eliminar { background:#fff5f5; border-color:#fca5a5; color:var(--rojo); }
    .liga-abtn.eliminar:hover { background:#fee2e2; }

    /* Sección título */
    .sec-label { font-size:10px; font-weight:900; color:var(--sutil); text-transform:uppercase; letter-spacing:.5px; margin:12px 0 6px; }

    /* Alertas pendientes */
    .alerta-card { border-radius:12px; padding:10px 13px; margin-bottom:7px; cursor:pointer; border-left:3px solid var(--azul); background:#eff6ff; }
    
    .alerta-titulo { font-size:12px; font-weight:800; color:#1e40af; }
    .alerta-sub { font-size:10px; font-weight:600; color:var(--sutil); margin-top:2px; }

    /* Buscador */
    .search { background:var(--card); border:1.5px solid var(--borde); border-radius:12px; padding:9px 12px; display:flex; align-items:center; gap:8px; margin-bottom:4px; }
    .search svg { width:16px; height:16px; color:var(--sutil); flex-shrink:0; }
    .search input { border:none; outline:none; font-family:Nunito,sans-serif; font-size:13px; font-weight:600; color:var(--texto); background:transparent; width:100%; }
  </style>
</head>
<body>
<div class="page">
  <div id="header-container"></div>
  <nav id="nav-container"></nav>
  <main class="content">
    <div style="font-size:18px;font-weight:900;color:var(--texto);margin:4px 0 10px;padding-left:2px">Ligas</div>
    <div id="alertas-wrap"></div>
    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="buscador" type="text" placeholder="Buscar liga..." oninput="filtrar()">
    </div>
    <div id="ligas-wrap"><div class="loading"><div class="spinner"></div></div></div>
  </main>
  <button class="fab" onclick="window.location.href='../ligas/nueva-liga.html'" style="width:auto;padding:0 22px;border-radius:100px;font-size:13px;font-weight:800">＋ Nueva liga</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../ligas/js/store-liga.js"></script>
<script src="../ligas/js/ui.js"></script>
<script>

let _ligas = [];

async function renderAlertas() {
  const wrap = document.getElementById('alertas-wrap');
  const activas = _ligas.filter(l => l.estado === 'activa');
  if (!activas.length) { wrap.innerHTML = ''; return; }
  let html = `<div class="sec-label">Acciones pendientes</div>`;
  for (const liga of activas.slice(0,3)) {
    const { data: p } = await _sb.from('lp_partidos').select('id',{count:'exact'}).eq('liga_id',liga.id).eq('estado','pendiente');
    const n = p?.length||0;
    if (n > 0) html += `<div class="alerta-card" onclick="window.location.href='../ligas/liga.html?id=${liga.id}&tab=resultados'">
      <div class="alerta-titulo" style="color:var(--rojo)">${n} resultado${n>1?'s':''} sin anotar</div>
      <div class="alerta-sub">${liga.nombre}</div></div>`;
  }
  wrap.innerHTML = html;
}

function filtrar() {
  const q = (document.getElementById('buscador')?.value||'').toLowerCase().trim();
  renderLigas(q ? _ligas.filter(l => l.nombre.toLowerCase().includes(q)) : _ligas);
}

function renderLigas(lista) {
  lista = lista || _ligas;
  const wrap = document.getElementById('ligas-wrap');
  if (!lista.length) {
    wrap.innerHTML = `<div class="loading" style="flex-direction:column;gap:12px;padding:40px 16px">
      <div style="font-size:36px">🏆</div>
      <div style="font-size:14px;font-weight:800;color:var(--texto)">Crea tu primera liga</div>
      <div style="font-size:12px;font-weight:600;color:var(--sutil);text-align:center">Pulsa el botón + para empezar</div></div>`;
    return;
  }
  const activas     = lista.filter(l => l.estado !== 'finalizada');
  const finalizadas = lista.filter(l => l.estado === 'finalizada');
  let html = '';
  if (activas.length)     { html += `<div class="sec-label">En curso</div>`;                             activas.forEach(l => html += cardLiga(l)); }
  if (finalizadas.length) { html += `<div class="sec-label" style="margin-top:16px">Finalizadas</div>`;  finalizadas.forEach(l => html += cardLiga(l, true)); }
  wrap.innerHTML = html;
}

function cardLiga(l, finalizada = false) {
  const nParejas  = l.lp_parejas?.[0]?.count || 0;
  const catColor  = { Masculina:'cat-m', Femenina:'cat-f', Mixta:'cat-x' };
  const catCls    = catColor[l.categoria] || 'cat-b';
  const estados   = { borrador:'Borrador', inscripcion:'Inscripción', activa:'Activa', fase_final:'Fase final', finalizada:'Finalizada' };
  const icoBg     = { inscripcion:'#eff6ff', activa:'#dcfce7', fase_final:'#fef9c3', finalizada:'#f1f5f9', borrador:'#f8fafc' };
  const nDivs     = l.lp_divisiones?.length || (l.num_divisiones || '—');
  const jActual   = l.jornada_actual || '—';
  const jTotal    = l.num_jornadas   || '—';
  const nPend     = l.partidos_pendientes || 0;

  return `<div class="liga-card" ${finalizada ? 'style="opacity:.65"' : ''}>
    <div class="liga-header" onclick="toggleCard(this)">
      <div class="liga-ico" style="background:${icoBg[l.estado]||'#f1f5f9'}"><img src="../ligas/icons/ligas.png"></div>
      <div class="liga-info">
        <div class="liga-nombre">${l.nombre}</div>
        <div class="liga-meta">
          <span class="cat-chip ${catCls}">${l.categoria||'Sin cat.'}</span>
          <span class="chip c-${l.estado}">${estados[l.estado]||l.estado}</span>
        </div>
      </div>
      <div class="liga-chevron">›</div>
    </div>
    <div class="liga-stats">
      ${nDivs !== '—' ? `<span class="liga-stat">🏅 <strong>${nDivs}</strong> div.</span>` : ''}
      <span class="liga-stat">👥 <strong>${nParejas}</strong> pareja${nParejas!==1?'s':''}</span>
      ${jActual !== '—' ? `<span class="liga-stat">📅 <strong>J${jActual}/${jTotal}</strong></span>` : ''}
      ${nPend > 0 ? `<span class="liga-stat" style="color:var(--rojo)">🏓 <strong>${nPend}</strong> pend.</span>` : ''}
    </div>
    <div class="liga-body">
      <div class="liga-2btns">
        <button class="liga-abtn editar" onclick="event.stopPropagation();editarLiga('${l.id}')">✏️ &nbsp;Editar</button>
        <button class="liga-abtn eliminar" onclick="event.stopPropagation();eliminarLiga('${l.id}','${l.nombre.replace(/'/g,"\\'").replace(/"/g,'&quot;')}')">🗑 &nbsp;Eliminar</button>
      </div>
    </div>
  </div>`;
}

function toggleCard(header) {
  const chevron = header.querySelector('.liga-chevron');
  const body    = header.nextElementSibling; // liga-stats
  const bodyAcc = body.nextElementSibling;   // liga-body
  const isOpen  = bodyAcc.classList.contains('open');
  document.querySelectorAll('.liga-body').forEach(b => b.classList.remove('open'));
  document.querySelectorAll('.liga-chevron').forEach(c => c.classList.remove('open'));
  if (!isOpen) { bodyAcc.classList.add('open'); chevron.classList.add('open'); }
}

function editarLiga(id) {
  window.location.href = `../ligas/liga.html?id=${id}&tab=bases`;
}

async function eliminarLiga(id, nombre) {
  if (!confirm(`Eliminar la liga "${nombre}"? Esta acción no se puede deshacer.`)) return;
  await lpDeleteLiga(id);
  _ligas = _ligas.filter(l => l.id !== id);
  renderLigas();
  toast('Liga eliminada');
}

async function init() {
  renderHeader({ subtitulo:'Gestión de ligas', botonDerecho: 'menu' });
  renderNav('ligas');
  const ok = await lpInit(); if (!ok) return;
  await lpGetOrganizador();
  showLoading('ligas-wrap');
  _ligas = await lpGetLigas();
  renderLigas();
  await renderAlertas();
}
init();
</script>
</body>
</html>
